<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0b0b0d" />
<title>Command Center</title>
<link rel="manifest" href="./manifest.json" />
<style>
  :root {
    --ground: #0b0b0d;
    --ground-2: #0f0e11;
    --surface: #211e25;
    --surface-2: #2c2830;
    --hairline: rgba(201, 162, 75, 0.28);
    --hairline-soft: rgba(201, 162, 75, 0.16);
    --ink: #fbf8f0;
    --ink-dim: #d8cfb9;
    --ink-faint: #a89f88;
    --brass: #c9a24b;
    --brass-soft: rgba(201, 162, 75, 0.14);
    --brass-glow: rgba(201, 162, 75, 0.35);
    --ok: #7fa583;
    --warn: #bd7f3a;
    --danger: #bd5548;

    --font-display: ui-serif, "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    background:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(201,162,75,0.09), transparent 60%),
      var(--ground);
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    padding-bottom: calc(84px + env(safe-area-inset-bottom));
  }

  .shell { max-width: 480px; margin: 0 auto; }

  header {
    padding: 22px 18px 16px calc(18px + env(safe-area-inset-left));
    border-bottom: 1px solid var(--hairline-soft);
    position: sticky;
    top: 0;
    background: var(--ground);
    z-index: 10;
  }
  .eyebrow {
    font-size: 10.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--brass);
    margin: 0 0 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .eyebrow::before {
    content: "";
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--brass);
    box-shadow: 0 0 6px 1px var(--brass-glow);
  }
  .header-row { display: flex; align-items: baseline; justify-content: space-between; }
  h1.brand {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 500;
    margin: 0;
    text-wrap: balance;
  }
  .clock { font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-faint); font-variant-numeric: tabular-nums; white-space: nowrap; }

  .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .status-tile { display: flex; align-items: center; gap: 9px; padding: 9px 11px; border-radius: 12px; border: 1px solid var(--hairline-soft); background: var(--surface); min-width: 0; }
  .status-tile svg { flex: none; width: 15px; height: 15px; color: var(--ink-faint); }
  .status-tile.st-danger svg { color: var(--danger); }
  .status-tile.st-ok svg { color: var(--ok); }
  .status-tile .tt { min-width: 0; }
  .status-tile .tt .l { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-dim); font-weight: 700; white-space: nowrap; }
  .status-tile .tt .v { font-family: var(--font-mono); font-size: 13.5px; font-variant-numeric: tabular-nums; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--ink); }
  .status-tile.st-danger .tt .v { color: var(--danger); }
  .status-tile.st-pending .tt .v { color: var(--ink-faint); }

  main { padding: 16px 18px 0; }
  .tab-panel { display: none; flex-direction: column; gap: 12px; }
  .tab-panel.active { display: flex; }

  .insight { position: relative; display: flex; gap: 10px; align-items: flex-start; padding: 12px 34px 12px 14px; border-radius: 14px; background: linear-gradient(135deg, rgba(201,162,75,0.13), rgba(201,162,75,0.02)); border: 1px solid var(--hairline); }
  .insight svg.insight-icon { flex: none; margin-top: 2px; color: var(--brass); }
  .insight .eb { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--brass); margin: 0 0 4px; font-weight: 600; }
  .insight p { margin: 0; font-size: 13.5px; color: var(--ink); line-height: 1.45; }
  .insight-close {
    position: absolute; top: 8px; right: 8px; width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    background: none; border: none; color: var(--ink-faint); cursor: pointer;
    border-radius: 6px; font-size: 15px; line-height: 1; padding: 0;
  }
  .insight-close:hover { color: var(--ink); background: var(--surface-2); }
  .insight-close:focus-visible { outline: 2px solid var(--brass); outline-offset: 1px; }

  .card { background: var(--surface); border: 1px solid var(--hairline-soft); border-radius: 16px; padding: 16px 17px 17px; position: relative; }
  .card::before { content: ""; position: absolute; top: 0; left: 16px; right: 16px; height: 1px; background: linear-gradient(90deg, transparent, var(--brass), transparent); opacity: 0.55; }
  .card__head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 10px; }
  .card__title-group { display: flex; align-items: center; gap: 7px; min-width: 0; }
  .card__icon { width: 13px; height: 13px; color: var(--ink-faint); flex: none; }
  .card__title { font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--ink-dim); font-weight: 700; margin: 0; }
  .card__meta { font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-faint); flex: none; }

  .hero-figure { font-family: var(--font-display); font-size: 34px; font-weight: 600; line-height: 1.1; font-variant-numeric: tabular-nums; margin: 0; color: var(--ink); }
  .delta { font-family: var(--font-mono); font-size: 12.5px; font-variant-numeric: tabular-nums; margin: 4px 0 0; }
  .delta.good { color: var(--ok); }
  .delta.bad { color: var(--danger); }
  .delta.neutral { color: var(--ink-faint); }

  .stat-row { display: flex; gap: 10px; margin-top: 14px; }
  .stat-mini { flex: 1; border-left: 1px solid var(--hairline); padding-left: 10px; }
  .stat-mini .v { font-family: var(--font-mono); font-size: 15px; font-variant-numeric: tabular-nums; }
  .stat-mini .l { font-size: 10.5px; color: var(--ink-faint); margin-top: 2px; }

  .sparkline-wrap { margin-top: 14px; }
  .sparkline-wrap svg { width: 100%; height: 46px; display: block; }

  .funnel-row { margin-bottom: 8px; }
  .funnel-row:last-child { margin-bottom: 0; }
  .funnel-labels { display: flex; justify-content: space-between; font-size: 12.5px; margin-bottom: 4px; }
  .funnel-labels .stage { color: var(--ink); }
  .funnel-labels .count { font-family: var(--font-mono); color: var(--ink-dim); font-variant-numeric: tabular-nums; }
  .funnel-track { height: 8px; border-radius: 4px; background: var(--surface-2); overflow: hidden; }
  .funnel-fill { height: 100%; background: linear-gradient(90deg, rgba(201,162,75,0.55), var(--brass)); border-radius: 4px; }

  .bench-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--hairline-soft); font-size: 13px; gap: 10px; }
  .bench-row:last-child { border-bottom: none; }
  .bench-name { color: var(--ink); flex: none; }
  .bench-vals { display: flex; align-items: center; gap: 10px; font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
  .bench-vals .cpc { color: var(--ink); font-size: 12.5px; width: 56px; text-align: right; }
  .bench-vals .pct { font-size: 11.5px; width: 40px; text-align: right; }
  .divbar { position: relative; width: 48px; height: 14px; flex: none; }
  .divbar .mid { position: absolute; left: 50%; top: 1px; bottom: 1px; width: 1px; background: var(--hairline); }
  .divbar .fill { position: absolute; top: 5px; height: 4px; border-radius: 2px; }

  .progress-track { height: 6px; border-radius: 999px; background: var(--surface-2); overflow: hidden; margin-top: 10px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--brass), #e2c37a); border-radius: 999px; }
  .progress-labels { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 11px; color: var(--ink-faint); margin-top: 6px; font-variant-numeric: tabular-nums; }

  .row-list { list-style: none; margin: 0; padding: 0; }
  .row-list li { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--hairline-soft); font-size: 13px; }
  .row-list li:last-child { border-bottom: none; }
  .row-figs { font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-dim); font-variant-numeric: tabular-nums; }
  .row-figs b.viol { color: var(--danger); font-weight: 600; }

  .project-active { background: linear-gradient(160deg, rgba(201,162,75,0.10), transparent 60%), var(--surface); border: 1px solid var(--hairline); }
  .status-pill { display: inline-flex; align-items: center; gap: 6px; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--brass); font-weight: 700; }
  .status-pill::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: var(--brass); }
  .status-pill.danger { color: var(--danger); }
  .status-pill.danger::before { background: var(--danger); }
  .project-name { font-family: var(--font-display); font-size: 19px; font-weight: 600; margin: 8px 0 4px; }
  .project-desc { font-size: 12.5px; color: var(--ink-dim); margin-bottom: 12px; }
  .step-track { display: flex; gap: 4px; margin-bottom: 6px; }
  .step-track i { flex: 1; height: 5px; border-radius: 3px; background: var(--surface-2); }
  .step-track i.done { background: var(--brass); }
  .step-caption { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 11px; color: var(--ink-faint); font-variant-numeric: tabular-nums; }

  .qb-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .qb-btn { font-family: var(--font-body); font-size: 12.5px; color: var(--ink); background: var(--surface-2); border: 1px solid var(--hairline); border-radius: 9px; padding: 8px 12px; cursor: pointer; }
  .qb-btn.primary { color: #191408; background: linear-gradient(160deg, #ddc077, var(--brass)); border: none; font-weight: 600; }
  .qb-btn.ghost { background: none; color: var(--ink-faint); }
  .qb-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .qb-btn:focus-visible { outline: 2px solid var(--brass); outline-offset: 2px; }

  .tiendo-form { display: none; gap: 8px; margin-top: 12px; }
  .tiendo-form.open { display: flex; }
  .tiendo-form input {
    flex: 1; font-family: var(--font-body); font-size: 13px; color: var(--ink);
    background: var(--surface-2); border: 1px solid var(--hairline); border-radius: 9px; padding: 9px 11px;
  }
  .tiendo-form input:focus-visible { outline: 2px solid var(--brass); outline-offset: 1px; }

  .queue-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--hairline-soft); font-size: 13px; gap: 10px; }
  .queue-row:last-child { border-bottom: none; }
  .queue-tag { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-faint); border: 1px solid var(--hairline); border-radius: 999px; padding: 3px 9px; flex: none; }

  .streak-card { display: flex; flex-direction: column; align-items: center; padding: 26px 16px 22px; }
  .ring-wrap { position: relative; width: 132px; height: 132px; }
  .ring-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-center .num { font-family: var(--font-display); font-size: 36px; font-weight: 600; line-height: 1; color: var(--ink); }
  .ring-center .unit { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-dim); margin-top: 4px; }
  .streak-sub { font-size: 12.5px; color: var(--ink-dim); margin-top: 14px; text-align: center; }

  .channel-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--hairline-soft); font-size: 13px; }
  .channel-row:last-child { border-bottom: none; }
  .channel-figs { display: flex; align-items: baseline; gap: 7px; font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
  .channel-figs .v { font-size: 14px; color: var(--ink); }
  .channel-figs .d { font-size: 11px; }
  .channel-figs .d.good { color: var(--ok); }
  .channel-figs .d.bad { color: var(--danger); }

  .tap-row { display: flex; gap: 8px; margin-top: 4px; }
  .tap-btn {
    flex: 1; font-family: var(--font-body); font-size: 13px; font-weight: 600; color: var(--brass);
    background: var(--brass-soft); border: 1px solid var(--hairline); border-radius: 10px; padding: 11px 8px; cursor: pointer;
  }
  .tap-btn:disabled { opacity: 0.55; cursor: not-allowed; }
  .tap-btn:focus-visible { outline: 2px solid var(--brass); outline-offset: 2px; }

  .kenh-form { display: none; flex-direction: column; gap: 8px; margin-top: 12px; }
  .kenh-form.open { display: flex; }
  .kenh-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .kenh-form input {
    font-family: var(--font-mono); font-size: 13px; color: var(--ink); background: var(--surface-2);
    border: 1px solid var(--hairline); border-radius: 9px; padding: 9px 11px; width: 100%;
  }
  .kenh-form label { font-size: 10px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 4px; }
  .kenh-form input:focus-visible { outline: 2px solid var(--brass); outline-offset: 1px; }

  .banner-danger {
    padding: 14px 15px; border-radius: 14px; background: rgba(189,85,72,0.12); border: 1px solid rgba(189,85,72,0.4);
  }
  .banner-danger .bd-title { font-size: 13.5px; font-weight: 700; color: var(--danger); margin: 0 0 4px; }
  .banner-danger p { margin: 0 0 10px; font-size: 13px; color: var(--ink); line-height: 1.45; }
  .banner-danger .bd-form { display: flex; gap: 8px; }
  .banner-danger input {
    flex: 1; font-family: var(--font-body); font-size: 13px; color: var(--ink); background: var(--surface-2);
    border: 1px solid rgba(189,85,72,0.4); border-radius: 9px; padding: 9px 11px;
  }
  .banner-danger input:focus-visible { outline: 2px solid var(--danger); outline-offset: 1px; }
  .banner-warn { padding: 12px 14px; border-radius: 14px; background: rgba(189,127,58,0.12); border: 1px solid rgba(189,127,58,0.35); font-size: 13px; color: var(--ink); line-height: 1.45; }

  .ritual-form { display: flex; flex-direction: column; gap: 8px; }
  .ritual-form label { font-size: 10px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 4px; }
  .ritual-form input {
    font-family: var(--font-body); font-size: 13px; color: var(--ink); background: var(--surface-2);
    border: 1px solid var(--hairline); border-radius: 9px; padding: 9px 11px; width: 100%;
  }
  .ritual-form input:focus-visible { outline: 2px solid var(--brass); outline-offset: 1px; }
  .ritual-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .priority-item { display: flex; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--hairline-soft); font-size: 13px; }
  .priority-item:last-child { border-bottom: none; }
  .priority-letter { font-family: var(--font-display); color: var(--brass); font-size: 15px; width: 18px; flex: none; }

  .dongtuan-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .dongtuan-cell { background: var(--surface-2); border-radius: 10px; padding: 10px 12px; }
  .dongtuan-cell .v { font-family: var(--font-mono); font-size: 18px; font-variant-numeric: tabular-nums; color: var(--ink); }
  .dongtuan-cell .l { font-size: 10.5px; color: var(--ink-faint); margin-top: 2px; }

  .energy-wrap svg { width: 100%; height: 100px; display: block; }

  .placeholder { color: var(--ink-faint); font-size: 13px; text-align: center; padding: 34px 10px; }
  .loading, .error { text-align: center; padding: 24px 0; color: var(--ink-faint); font-size: 14px; }
  .error { color: var(--danger); }

  nav {
    position: fixed; left: 14px; right: 14px; bottom: 14px;
    display: flex; background: rgba(23,22,27,0.92); backdrop-filter: blur(10px);
    border: 1px solid var(--hairline); border-radius: 18px; padding: 6px; gap: 4px;
    max-width: 480px; margin: 0 auto;
  }
  nav button {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
    border: none; background: none; color: var(--ink-faint); font-family: var(--font-body);
    font-size: 10px; padding: 9px 2px 8px; border-radius: 12px; cursor: pointer;
    transition: color 0.15s ease, background 0.15s ease;
  }
  nav button svg { width: 19px; height: 19px; }
  nav button.active { color: var(--brass); background: var(--brass-soft); }
  nav button:focus-visible { outline: 2px solid var(--brass); outline-offset: 2px; }

  @media (prefers-reduced-motion: no-preference) {
    .card, .insight, .status-grid { animation: rise 0.4s ease both; }
    @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<div class="shell">
<header>
  <p class="eyebrow">Chỉ huy sở cá nhân</p>
  <div class="header-row">
    <h1 class="brand" id="tab-title">Genkii</h1>
    <span class="clock" id="clock">—</span>
  </div>
</header>

<main>
  <section class="tab-panel active" id="panel-a" data-title="Genkii">
    <div class="status-grid" id="status-grid">
      <div class="status-tile st-pending" id="tile-sla">
        <svg viewBox="0 0 20 20" fill="none"><path d="M10 3L18 16H2L10 3Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M10 8.5V12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="10" cy="14.2" r="0.9" fill="currentColor"/></svg>
        <div class="tt"><div class="l">SLA</div><div class="v">—</div></div>
      </div>
      <div class="status-tile st-pending" id="tile-overdue">
        <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.4"/><path d="M10 6V10L13 12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <div class="tt"><div class="l">Quá hạn LH</div><div class="v">—</div></div>
      </div>
      <div class="status-tile st-pending" id="tile-budget">
        <svg viewBox="0 0 20 20" fill="none"><path d="M3 14A7 7 0 0 1 17 14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M10 14L13.2 9.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="10" cy="14" r="1.1" fill="currentColor"/></svg>
        <div class="tt"><div class="l">Ngân sách hôm qua</div><div class="v">—</div></div>
      </div>
      <div class="status-tile st-pending" id="tile-benchmark">
        <svg viewBox="0 0 20 20" fill="none"><rect x="3" y="11" width="3" height="6" rx="0.8" fill="currentColor"/><rect x="8.5" y="7" width="3" height="10" rx="0.8" fill="currentColor"/><rect x="14" y="3" width="3" height="14" rx="0.8" fill="currentColor"/></svg>
        <div class="tt"><div class="l">Benchmark nhóm</div><div class="v">—</div></div>
      </div>
    </div>
    <div id="tab-a-content" class="loading">Đang tải...</div>
  </section>

  <section class="tab-panel" id="panel-b" data-title="Tài sản">
    <div id="tab-b-content" class="loading">Đang tải...</div>
  </section>

  <section class="tab-panel" id="panel-c" data-title="Thương hiệu cá nhân">
    <div id="tab-c-content" class="loading">Đang tải...</div>
  </section>

  <section class="tab-panel" id="panel-d" data-title="Nghi thức">
    <div id="tab-d-content" class="loading">Đang tải...</div>
  </section>
</main>
</div>

<nav>
  <button type="button" class="active" data-tab="a">
    <svg viewBox="0 0 20 20" fill="none"><path d="M2 14L6 8L9 12L13 5L18 10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Genkii
  </button>
  <button type="button" data-tab="b">
    <svg viewBox="0 0 20 20" fill="none"><rect x="3" y="12" width="14" height="3.2" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="3" y="7.4" width="10" height="3.2" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="3" y="2.8" width="6" height="3.2" rx="1" stroke="currentColor" stroke-width="1.4"/></svg>
    Tài sản
  </button>
  <button type="button" data-tab="c">
    <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.4"/><circle cx="10" cy="10" r="2.4" fill="currentColor"/></svg>
    Thương hiệu
  </button>
  <button type="button" data-tab="d">
    <svg viewBox="0 0 20 20" fill="none"><path d="M10 2L18 6V10C18 14.5 14.6 17.6 10 18.5C5.4 17.6 2 14.5 2 10V6L10 2Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M7 10L9.2 12.2L13.4 8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Nghi thức
  </button>
</nav>

<script>
  // ── Cấu hình ──────────────────────────────────────────────
  const CONFIG = {
    apiUrl: 'https://script.google.com/macros/s/AKfycbxIRzkSHXxK9YLTF7SajBU_fZNUS5IWUtYQAazeYsX2ofJwX5SKb7SmNraZ3WSigE3Jfw/exec',
    token: 'awMOz1E1YZC8ZCG3hlecG1VZ'
  };

  // ── Đồng hồ nhỏ ───────────────────────────────────────────
  function tickClock() {
    const el = document.getElementById('clock');
    const now = new Date();
    const dd = String(now.getDate()).padStart(2, '0');
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    const hh = String(now.getHours()).padStart(2, '0');
    const mi = String(now.getMinutes()).padStart(2, '0');
    el.textContent = `${dd}.${mm} · ${hh}:${mi}`;
  }
  tickClock();
  setInterval(tickClock, 30000);

  // ── Điều hướng tab ────────────────────────────────────────
  const navButtons = document.querySelectorAll('nav button');
  const panels = { a: 'panel-a', b: 'panel-b', c: 'panel-c', d: 'panel-d' };
  let tabBLoaded = false;
  let tabCLoaded = false;
  let tabDLoaded = false;
  navButtons.forEach((btn) => {
    btn.addEventListener('click', () => {
      navButtons.forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
      Object.values(panels).forEach((id) => document.getElementById(id).classList.remove('active'));
      const panel = document.getElementById(panels[btn.dataset.tab]);
      panel.classList.add('active');
      document.getElementById('tab-title').textContent = panel.dataset.title;

      if (btn.dataset.tab === 'b' && !tabBLoaded) {
        tabBLoaded = true;
        loadTabB();
      }
      if (btn.dataset.tab === 'c' && !tabCLoaded) {
        tabCLoaded = true;
        loadTabC();
      }
      if (btn.dataset.tab === 'd' && !tabDLoaded) {
        tabDLoaded = true;
        loadTabD();
      }
    });
  });

  // ── JSONP tới Command Center backend ────────────────────
  function jsonp(action, params) {
    return new Promise((resolve, reject) => {
      const cbName = 'cb_' + Date.now() + '_' + Math.floor(Math.random() * 1e6);
      const query = new URLSearchParams({ ...params, action, token: CONFIG.token, callback: cbName });
      const script = document.createElement('script');
      const timeout = setTimeout(() => { cleanup(); reject(new Error('Hết thời gian chờ')); }, 15000);
      function cleanup() {
        clearTimeout(timeout);
        delete window[cbName];
        script.remove();
      }
      window[cbName] = (data) => { cleanup(); resolve(data); };
      script.onerror = () => { cleanup(); reject(new Error('Lỗi tải dữ liệu')); };
      script.src = `${CONFIG.apiUrl}?${query.toString()}`;
      document.body.appendChild(script);
    });
  }

  // POST no-cors "bắn và quên" — không đọc được response, phải reload GET sau đó để biết trạng thái thật
  function postAction(action, params) {
    const body = new URLSearchParams({ ...params, action, token: CONFIG.token });
    return fetch(CONFIG.apiUrl, { method: 'POST', mode: 'no-cors', body });
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function formatVndClient(n) {
    return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  }

  // Chỉ dựng banner khi có nội dung — trả '' (ẩn hẳn) nếu không có gì đáng chú ý
  function renderInsight(text) {
    if (!text) return '';
    return `
      <div class="insight">
        <svg class="insight-icon" width="15" height="15" viewBox="0 0 20 20" fill="none"><path d="M10 2L11.6 8.4L18 10L11.6 11.6L10 18L8.4 11.6L2 10L8.4 8.4L10 2Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
        <div><p class="eb">Đáng chú ý</p><p>${text}</p></div>
        <button class="insight-close" type="button" aria-label="Ẩn thông báo">×</button>
      </div>`;
  }

  document.addEventListener('click', (e) => {
    const btn = e.target.closest('.insight-close');
    if (btn) btn.closest('.insight').remove();
  });

  const ICON_TREND = '<svg class="card__icon" viewBox="0 0 20 20" fill="none"><path d="M3 13L8 8L11.5 11L17 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="17" cy="5" r="1.3" fill="currentColor"/></svg>';
  const ICON_BARS = '<svg class="card__icon" viewBox="0 0 20 20" fill="none"><rect x="3" y="11" width="3" height="6" rx="0.8" fill="currentColor"/><rect x="8.5" y="7" width="3" height="10" rx="0.8" fill="currentColor"/><rect x="14" y="3" width="3" height="14" rx="0.8" fill="currentColor"/></svg>';
  const ICON_GAUGE = '<svg class="card__icon" viewBox="0 0 20 20" fill="none"><path d="M3 14A7 7 0 0 1 17 14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M10 14L13.2 9.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="10" cy="14" r="1.1" fill="currentColor"/></svg>';
  const ICON_TRIANGLE = '<svg class="card__icon" viewBox="0 0 20 20" fill="none"><path d="M10 3L18 16H2L10 3Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M10 8.5V12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="10" cy="14.2" r="0.9" fill="currentColor"/></svg>';
  const ICON_FLAG = '<svg class="card__icon" viewBox="0 0 20 20" fill="none"><path d="M5 17V3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M5 4H15L12.5 7.5L15 11H5" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>';
  const ICON_GRID = '<svg class="card__icon" viewBox="0 0 20 20" fill="none"><rect x="3" y="3" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="11" y="3" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="3" y="11" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="11" y="11" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.4"/></svg>';

  // ── Sparkline dùng chung ─────────────────────────────────
  function drawSparkline(svgId, values) {
    const svg = document.getElementById(svgId);
    if (!svg || values.length < 2) return;
    const w = 280, h = 46, pad = 4;
    const min = Math.min(...values), max = Math.max(...values);
    const range = (max - min) || 1;
    const pts = values.map((v, i) => [
      pad + (i / (values.length - 1)) * (w - pad * 2),
      h - pad - ((v - min) / range) * (h - pad * 2)
    ]);
    const line = pts.map((p) => p.join(',')).join(' ');
    const area = `M${pts[0][0]},${h} L${line.split(' ').join(' L')} L${pts[pts.length - 1][0]},${h} Z`;
    const last = pts[pts.length - 1];
    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    svg.innerHTML = `
      <defs><linearGradient id="g-${svgId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#c9a24b" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="#c9a24b" stop-opacity="0"/>
      </linearGradient></defs>
      <path d="${area}" fill="url(#g-${svgId})"/>
      <polyline points="${line}" fill="none" stroke="#c9a24b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${last[0]}" cy="${last[1]}" r="3" fill="#c9a24b"/>`;
  }

  // ── Insight — tổng hợp 1 câu từ dữ liệu thật, không suy diễn ──
  // Ưu tiên: cảnh báo ngân sách Ads > vi phạm SLA > nhóm Ads lệch mạnh MA7 (≥20%) > delta CRM âm > ổn định
  function buildInsight(crm, ads) {
    const t = crm.today || {};
    if (ads && !ads.error && ads.warnings && ads.warnings.length > 0) {
      return `${escapeHtml(ads.warnings[0])}.`;
    }
    if ((crm.totalViPham || 0) > 0) {
      return `<strong>${crm.totalViPham} vi phạm SLA</strong> đang chờ xử lý — ưu tiên trước khi thêm việc mới.`;
    }
    if (ads && !ads.error && ads.groups) {
      let worst = null;
      Object.keys(ads.groups).forEach((name) => {
        const g = ads.groups[name];
        if (g.eligible && g.deltaPct !== null && Math.abs(g.deltaPct) >= 20) {
          if (!worst || Math.abs(g.deltaPct) > Math.abs(worst.deltaPct)) worst = { name, deltaPct: g.deltaPct };
        }
      });
      if (worst) {
        const dir = worst.deltaPct > 0 ? 'tăng' : 'giảm';
        return `CPC nhóm <strong>${escapeHtml(worst.name)}</strong> ${dir} ${Math.abs(Math.round(worst.deltaPct))}% so MA7 — đáng kiểm tra.`;
      }
    }
    if ((t.delta || 0) < 0) {
      return `Lượt hôm nay giảm <strong>${Math.abs(t.delta)}</strong> so hôm qua — đáng theo dõi.`;
    }
    return null; // không có gì đặc biệt — ẩn banner, khỏi lặp lại số liệu đã có trong card
  }

  // ── Thẻ Ads & ROAS ────────────────────────────────────────
  function renderAdsCard(ads) {
    if (!ads || ads.error) {
      return `
        <div class="card">
          <div class="card__head"><div class="card__title-group">${ICON_TREND}<p class="card__title">Ads &amp; ROAS</p></div></div>
          <div class="placeholder">${ads && ads.error ? escapeHtml(ads.error) : 'Chờ dữ liệu Ads'}</div>
        </div>`;
    }

    const t = ads.today;
    const deltaChiPhi = ads.ma7.chiPhi ? ((t.chiPhi - ads.ma7.chiPhi) / ads.ma7.chiPhi) * 100 : null;
    const heroClass = deltaChiPhi === null ? 'neutral' : (Math.abs(deltaChiPhi) < 10 ? 'neutral' : (deltaChiPhi > 0 ? 'bad' : 'good'));

    const groupOrder = ['Chuyển đổi BES', 'Tương tác', 'Retargeting', 'Hub B2B'];
    const benchHtml = groupOrder.map((name) => {
      const g = ads.groups[name];
      if (!g || g.todayCpc === null) {
        return `<div class="bench-row"><span class="bench-name">${escapeHtml(name)}</span><span class="row-figs">không chạy</span></div>`;
      }
      if (!g.eligible) {
        return `<div class="bench-row"><span class="bench-name">${escapeHtml(name)}</span><span class="bench-vals"><span class="cpc">${formatVndClient(g.todayCpc)}đ</span><span class="pct" style="color:var(--ink-faint)">${g.activeDays}/5 ngày</span></span></div>`;
      }
      const pct = g.deltaPct;
      const cls = pct === null ? 'neutral' : (Math.abs(pct) < 10 ? 'neutral' : (pct > 0 ? 'bad' : 'good'));
      const barWidth = Math.min(24, Math.abs(pct || 0));
      const barSide = pct >= 0 ? `left:50%; width:${barWidth}px;` : `right:50%; width:${barWidth}px;`;
      const barColor = cls === 'neutral' ? 'var(--ink-faint)' : (cls === 'bad' ? 'var(--danger)' : 'var(--ok)');
      return `
        <div class="bench-row">
          <span class="bench-name">${escapeHtml(name)}</span>
          <span class="bench-vals">
            <span class="divbar"><span class="mid"></span><span class="fill" style="${barSide} background:${barColor};"></span></span>
            <span class="cpc">${formatVndClient(g.todayCpc)}đ</span>
            <span class="pct delta ${cls}">${pct >= 0 ? '▲' : '▼'}${Math.abs(Math.round(pct))}%</span>
          </span>
        </div>`;
    }).join('');

    const budget = ads.budget;
    const budgetPct = budget.monthPaceTarget > 0 ? Math.min(100, (budget.monthSpend / budget.monthPaceTarget) * 100) : 0;

    const unclassifiedHtml = (ads.unclassified && ads.unclassified.length > 0) ? `
      <div class="card">
        <div class="card__head"><div class="card__title-group">${ICON_TRIANGLE}<p class="card__title">Chưa phân loại</p></div></div>
        <div class="placeholder">${ads.unclassified.map(escapeHtml).join(', ')} — cần bổ sung pattern nhóm trong CLAUDE.md</div>
      </div>` : '';

    return `
      <div class="card">
        <div class="card__head">
          <div class="card__title-group">${ICON_TREND}<p class="card__title">Chi phí Ads hôm qua</p></div>
          <span class="card__meta">${escapeHtml(ads.adsDate)}</span>
        </div>
        <p class="hero-figure">${formatVndClient(t.chiPhi)} đ</p>
        <p class="delta ${heroClass}">${deltaChiPhi === null ? 'Chưa đủ dữ liệu MA7' : `${deltaChiPhi >= 0 ? '▲' : '▼'} ${Math.abs(Math.round(deltaChiPhi))}% so MA7 (${formatVndClient(ads.ma7.chiPhi)}đ)`}</p>
        <div class="stat-row">
          <div class="stat-mini"><div class="v">${t.cpm !== null ? formatVndClient(t.cpm) : '–'}</div><div class="l">CPM (đ)</div></div>
          <div class="stat-mini"><div class="v">${t.ctr !== null ? t.ctr.toFixed(2) + '%' : '–'}</div><div class="l">CTR</div></div>
          <div class="stat-mini"><div class="v">${t.cpc !== null ? formatVndClient(t.cpc) : '–'}</div><div class="l">CPC (đ)</div></div>
        </div>
        <div class="sparkline-wrap"><svg id="spark-adschiphi"></svg></div>
      </div>

      <div class="card">
        <div class="card__head">
          <div class="card__title-group">${ICON_BARS}<p class="card__title">Benchmark theo nhóm</p></div>
          <span class="card__meta">CPC vs MA7</span>
        </div>
        ${benchHtml}
      </div>

      <div class="card">
        <div class="card__head">
          <div class="card__title-group">${ICON_GAUGE}<p class="card__title">Nhịp ngân sách tháng</p></div>
          <span class="card__meta">${budget.monthDaysRun} ngày chạy</span>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width:${budgetPct}%"></div></div>
        <div class="progress-labels"><span>${formatVndClient(budget.monthSpend)}đ đã chi</span><span>${formatVndClient(budget.monthPaceTarget)}đ mục tiêu</span></div>
      </div>

      ${unclassifiedHtml}
    `;
  }

  // ── Tab A — Genkii ───────────────────────────────────────
  function renderTabA(data, ads) {
    const t = data.today || {};
    const deltaClass = (t.delta || 0) >= 0 ? 'good' : 'bad';
    const deltaSign = (t.delta || 0) >= 0 ? '+' : '';

    const funnelMax = (data.funnel && data.funnel[0] && data.funnel[0].count) || 1;
    const funnelHtml = (data.funnel || []).map((f) => `
      <div class="funnel-row">
        <div class="funnel-labels"><span class="stage">${escapeHtml(f.stage)}</span><span class="count">${f.count}</span></div>
        <div class="funnel-track"><div class="funnel-fill" style="width:${Math.max(2, (f.count / funnelMax) * 100)}%"></div></div>
      </div>`).join('');

    const sourcesHtml = ((data.sources && data.sources.items) || []).map((s) =>
      `<li><span>${escapeHtml(s.name)}</span><span class="row-figs">${s.count}</span></li>`
    ).join('');

    const salesHtml = (data.sales || []).map((s) => `
      <li>
        <span>${escapeHtml(s.name)}</span>
        <span class="row-figs">${s.khachMoi} khách mới · ${s.quaHan} quá hạn · ${s.viPham > 0 ? `<b class="viol">${s.viPham} vi phạm</b>` : '0 vi phạm'}</span>
      </li>`).join('');

    return `
      ${renderInsight(buildInsight(data, ads))}

      <div class="card">
        <div class="card__head">
          <div class="card__title-group">
            <svg class="card__icon" viewBox="0 0 20 20" fill="none"><path d="M2 10H6L8 4L12 16L14 10H18" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <p class="card__title">Khách mới hôm nay</p>
          </div>
          <span class="card__meta">${escapeHtml(data.generatedAt || '')}</span>
        </div>
        <p class="hero-figure">${t.khachMoi ?? '–'}</p>
        <p class="delta ${deltaClass}">${deltaSign}${t.delta ?? 0} so hôm qua</p>
        <div class="stat-row">
          <div class="stat-mini"><div class="v">${t.clickQC ?? '–'}</div><div class="l">Click lại QC</div></div>
          <div class="stat-mini"><div class="v">${t.tongLuot ?? '–'}</div><div class="l">Tổng lượt</div></div>
          <div class="stat-mini"><div class="v">${t.uniqueQC ?? '–'}</div><div class="l">Unique QC</div></div>
        </div>
        <div class="sparkline-wrap"><svg id="spark-khachmoi"></svg></div>
      </div>

      <div class="card">
        <div class="card__head">
          <div class="card__title-group">
            <svg class="card__icon" viewBox="0 0 20 20" fill="none"><path d="M10 3L18 16H2L10 3Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M10 8.5V12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="10" cy="14.2" r="0.9" fill="currentColor"/></svg>
            <p class="card__title">Quá hạn &amp; vi phạm SLA</p>
          </div>
        </div>
        <div class="stat-row" style="margin-top:0">
          <div class="stat-mini" style="border-left:none; padding-left:0"><div class="v">${data.totalOverdue ?? '–'}</div><div class="l">Quá hạn liên hệ</div></div>
          <div class="stat-mini"><div class="v">${data.totalViPham ?? '–'}</div><div class="l">Vi phạm SLA</div></div>
        </div>
      </div>

      <div class="card">
        <div class="card__head">
          <div class="card__title-group">
            <svg class="card__icon" viewBox="0 0 20 20" fill="none"><path d="M3 4H17L12 11V16L8 14V11L3 4Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
            <p class="card__title">Phễu giai đoạn</p>
          </div>
        </div>
        ${funnelHtml || '<div class="placeholder">Chưa có dữ liệu</div>'}
      </div>

      <div class="card">
        <div class="card__head">
          <div class="card__title-group">
            <svg class="card__icon" viewBox="0 0 20 20" fill="none"><rect x="3" y="11" width="3" height="6" rx="0.8" fill="currentColor"/><rect x="8.5" y="7" width="3" height="10" rx="0.8" fill="currentColor"/><rect x="14" y="3" width="3" height="14" rx="0.8" fill="currentColor"/></svg>
            <p class="card__title">Nguồn lead (${escapeHtml((data.sources && data.sources.scope) || '')})</p>
          </div>
        </div>
        <ul class="row-list">${sourcesHtml || '<li>Chưa có dữ liệu</li>'}</ul>
      </div>

      <div class="card">
        <div class="card__head">
          <div class="card__title-group">
            <svg class="card__icon" viewBox="0 0 20 20" fill="none"><circle cx="7" cy="8" r="2.6" stroke="currentColor" stroke-width="1.4"/><circle cx="14" cy="10" r="2" stroke="currentColor" stroke-width="1.4"/><path d="M2.5 16C3 12.8 4.7 11.2 7 11.2C9.3 11.2 11 12.8 11.5 16" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M12.3 16C12.7 13.6 13.7 12.4 15.3 12.4C16.4 12.4 17.2 13 17.6 14.2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            <p class="card__title">Hoạt động Sales</p>
          </div>
        </div>
        <ul class="row-list">${salesHtml || '<li>Chưa có dữ liệu</li>'}</ul>
      </div>

      ${renderAdsCard(ads)}
    `;
  }

  function updateStatusGrid(data, ads) {
    const slaTile = document.getElementById('tile-sla');
    const overdueTile = document.getElementById('tile-overdue');
    const vip = data.totalViPham || 0;
    const overdue = data.totalOverdue || 0;
    slaTile.classList.toggle('st-danger', vip > 0);
    slaTile.classList.toggle('st-pending', vip === 0);
    slaTile.querySelector('.v').textContent = vip > 0 ? `${vip} vi phạm` : 'Không có';
    overdueTile.classList.toggle('st-danger', overdue > 0);
    overdueTile.classList.toggle('st-pending', overdue === 0);
    overdueTile.querySelector('.v').textContent = overdue > 0 ? `${overdue} quá hạn` : 'Không có';

    const budgetTile = document.getElementById('tile-budget');
    const benchTile = document.getElementById('tile-benchmark');
    if (!ads || ads.error) {
      budgetTile.querySelector('.v').textContent = 'Lỗi tải';
      benchTile.querySelector('.v').textContent = 'Lỗi tải';
      return;
    }

    const overBudget = (ads.warnings || []).some((w) => w.indexOf('vượt ngưỡng') !== -1);
    budgetTile.classList.toggle('st-danger', overBudget);
    budgetTile.classList.toggle('st-pending', !overBudget);
    budgetTile.querySelector('.v').textContent = formatVndClient(ads.today.chiPhi) + 'đ';

    let worst = null;
    Object.keys(ads.groups).forEach((name) => {
      const g = ads.groups[name];
      if (g.eligible && g.deltaPct !== null) {
        if (!worst || Math.abs(g.deltaPct) > Math.abs(worst.deltaPct)) worst = { name, deltaPct: g.deltaPct };
      }
    });
    if (worst && Math.abs(worst.deltaPct) >= 20) {
      benchTile.classList.add('st-danger');
      benchTile.classList.remove('st-pending');
      benchTile.querySelector('.v').textContent = `${worst.name} ${worst.deltaPct >= 0 ? '+' : ''}${Math.round(worst.deltaPct)}%`;
    } else {
      benchTile.classList.remove('st-danger');
      benchTile.classList.add('st-pending');
      benchTile.querySelector('.v').textContent = 'Ổn định';
    }
  }

  async function loadTabA() {
    const el = document.getElementById('tab-a-content');
    if (!CONFIG.token) {
      el.className = 'error';
      el.textContent = 'Chưa cấu hình token — điền CONFIG.token trong index.html';
      return;
    }
    el.className = 'loading';
    el.textContent = 'Đang tải...';
    try {
      const [crmResult, adsResult] = await Promise.allSettled([
        jsonp('getDashboardData', {}),
        jsonp('getAdsToday', {})
      ]);
      if (crmResult.status !== 'fulfilled') throw crmResult.reason;
      const data = crmResult.value;
      if (data.error) {
        el.className = 'error';
        el.textContent = 'Lỗi: ' + data.error;
        return;
      }
      const ads = adsResult.status === 'fulfilled' ? adsResult.value : { error: 'Không tải được dữ liệu Ads' };

      el.className = '';
      el.innerHTML = renderTabA(data, ads);
      updateStatusGrid(data, ads);
      drawSparkline('spark-khachmoi', (data.daily || []).map((d) => d.khachMoi));
      if (!ads.error) drawSparkline('spark-adschiphi', (ads.daily || []).map((d) => d.chiPhi));
    } catch (err) {
      el.className = 'error';
      el.textContent = 'Không tải được dữ liệu: ' + err.message;
    }

  loadTabA();

  // ── Tab B — Tài sản (Quỹ B) ──────────────────────────────
  let tabBData = null;

  function stepTrackHtml(current, total) {
    if (!total) return '';
    let html = '';
    for (let i = 0; i < total; i++) html += `<i class="${i < current ? 'done' : ''}"></i>`;
    return html;
  }

  function formatDaysAgo(days) {
    if (days === null || days === undefined) return 'chưa cập nhật';
    if (days === 0) return 'cập nhật hôm nay';
    return `cập nhật ${days} ngày trước`;
  }

  function formatLogDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const dd = String(d.getDate()).padStart(2, '0');
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const hh = String(d.getHours()).padStart(2, '0');
    const mi = String(d.getMinutes()).padStart(2, '0');
    return `${dd}/${mm} ${hh}:${mi}`;
  }

  function renderRecentLog(logs) {
    if (!logs || logs.length === 0) return '';
    const rows = logs.map((l) => `
      <li>
        <span>${escapeHtml(l.ghiChu || '')}</span>
        <span class="row-figs">bước ${l.buoc} · ${formatLogDate(l.timestamp)}</span>
      </li>`).join('');
    return `
      <div class="card">
        <div class="card__head"><p class="card__title">Nhật ký gần đây</p></div>
        <ul class="row-list">${rows}</ul>
      </div>`;
  }

  function renderTabB(data) {
    const projects = data.projects || [];
    const active = projects.find((p) => p.trangThai === 'Active');
    const queued = projects.filter((p) => p.trangThai === 'Xếp hàng');
    const others = projects.filter((p) => p.trangThai !== 'Active' && p.trangThai !== 'Xếp hàng');

    // Chỉ nói khi có gì khẩn cấp (trì trệ), sắp đến hạn (còn ≤1 ngày), hoặc trạng thái bất thường (chưa có Active)
    let insightText = null;
    if (active && active.triTre) {
      insightText = `<strong>${escapeHtml(active.ten)}</strong> đã ${active.daysSinceUpdate} ngày chưa cập nhật tiến độ — trì trệ.`;
    } else if (!active) {
      insightText = `Chưa có dự án Active — bắt đầu 1 dự án từ danh sách Xếp hàng (WIP=1: chỉ 1 dự án Active cùng lúc).`;
    } else if (data.soNgayTriTre != null && active.daysSinceUpdate != null) {
      const remain = data.soNgayTriTre - active.daysSinceUpdate;
      if (remain <= 1) {
        insightText = `<strong>${escapeHtml(active.ten)}</strong> ${remain <= 0 ? 'đến hạn hôm nay' : 'còn 1 ngày nữa'} là bị đánh dấu trì trệ — nên cập nhật tiến độ.`;
      }
    }

    const activeHtml = active ? `
      <div class="card project-active">
        <span class="status-pill ${active.triTre ? 'danger' : ''}">${escapeHtml(active.trangThai)}${active.triTre ? ' · Trì trệ' : ''}</span>

        ${active.moTa ? `<p class="project-desc">${escapeHtml(active.moTa)}</p>` : ''}
        <div class="step-track">${stepTrackHtml(active.buocHienTai, active.tongBuoc)}</div>

          <button class="qb-btn ghost" data-action="complete" data-id="${escapeHtml(active.id)}" type="button">Hoàn thành</button>
          <button class="qb-btn ghost" data-action="freeze" data-id="${escapeHtml(active.id)}" type="button">Đóng băng</button>
        </div>
        <div class="tiendo-form" id="tiendo-form-${escapeHtml(active.id)}">
          <input type="text" id="tiendo-ghichu-${escapeHtml(active.id)}" placeholder="Ghi chú 1 dòng..." maxlength="120" />
          <button class="qb-btn primary" data-action="tiendo-submit" data-id="${escapeHtml(active.id)}" type="button">Gửi</button>
        </div>
      </div>` : '';

    const queuedHtml = queued.map((p) => `
      <div class="queue-row">
        <span>${escapeHtml(p.ten)}</span>

    const othersHtml = others.map((p) => `
      <div class="queue-row">
        <span>${escapeHtml(p.ten)}</span>
        <span class="queue-tag">${escapeHtml(p.trangThai)}</span>
      </div>`).join('');

    return `
      ${renderInsight(insightText)}
      ${activeHtml}
      ${active ? renderRecentLog(active.recentLog) : ''}
      ${queued.length > 0 ? `
      <div class="card">
        <div class="card__head"><div class="card__title-group">${ICON_BARS}<p class="card__title">Xếp hàng</p></div></div>

      <div class="card">
        <div class="card__head"><p class="card__title">Khác</p></div>

  document.getElementById('tab-b-content').addEventListener('click', async (e) => {

  function formatRelativeTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const dd = String(d.getDate()).padStart(2, '0');
    const mm = String(d.getMonth() + 1).padStart(2, '0');

  // Chỉ nói khi streak đang bị đe dọa thật (Thứ 6 trở đi mà chưa đạt chuẩn tuần) — gắn với ngày thực tế
  function buildInsightQuyC(data) {
    const cw = data.currentWeek;
    const remaining = Math.max(0, cw.mucTieu - cw.videoCount);
    if (remaining === 0) return null;
    const jsDay = new Date().getDay();
    const isoDay = jsDay === 0 ? 7 : jsDay;
    if (isoDay < 5) return null;
    const daysLeft = 7 - isoDay + 1;
    return `Còn <strong>${remaining} video</strong> nữa để đạt chuẩn tuần này — chỉ còn ${daysLeft} ngày (hết Chủ nhật).`;
  }

  function renderTabC(data) {
    const cw = data.currentWeek;
    const ringR = 58;
    const circumference = 2 * Math.PI * ringR;
    const ringProgress = Math.min(1, cw.mucTieu > 0 ? cw.videoCount / cw.mucTieu : 0);
    const ringOffset = circumference * (1 - ringProgress);

    const videosHtml = (data.recentVideos || []).map((v) => `
      <li>

    const kl = data.kenhLatest;
    const kp = data.kenhPrev;
    function deltaFig(cur, prev) {
      if (!kp) return '';
      const d = cur - prev;

      return `<span class="d ${d > 0 ? 'good' : 'bad'}">${d > 0 ? '+' : ''}${d}</span>`;
    }

    const kenhStatsHtml = kl ? `
      <div class="channel-row"><span class="channel-name">TikTok follow</span><span class="channel-figs"><span class="v">${kl.tiktokFollow}</span>${deltaFig(kl.tiktokFollow, kp ? kp.tiktokFollow : 0)}</span></div>
      <div class="channel-row"><span class="channel-name">FB1 follow</span><span class="channel-figs"><span class="v">${kl.fb1Follow}</span>${deltaFig(kl.fb1Follow, kp ? kp.fb1Follow : 0)}</span></div>
      <div class="channel-row"><span class="channel-name">FB2 follow</span><span class="channel-figs"><span class="v">${kl.fb2Follow}</span>${deltaFig(kl.fb2Follow, kp ? kp.fb2Follow : 0)}</span></div>
      <div class="channel-row"><span class="channel-name">Group thành viên</span><span class="channel-figs"><span class="v">${kl.groupThanhVien}</span>${deltaFig(kl.groupThanhVien, kp ? kp.groupThanhVien : 0)}</span></div>
      <div class="channel-row"><span class="channel-name">Câu hỏi inbound</span><span class="channel-figs"><span class="v">${kl.cauHoiInbound}</span>${deltaFig(kl.cauHoiInbound, kp ? kp.cauHoiInbound : 0)}</span></div>
    ` : '<div class="placeholder">Chưa có số liệu kênh</div>';

    return `
      ${renderInsight(buildInsightQuyC(data))}

      <div class="card streak-card">
        <div class="ring-wrap">
          <svg viewBox="0 0 132 132">
            <circle cx="66" cy="66" r="${ringR}" fill="none" stroke="var(--surface-2)" stroke-width="9"/>
            <circle cx="66" cy="66" r="${ringR}" fill="none" stroke="var(--brass)" stroke-width="9" stroke-linecap="round"
              stroke-dasharray="${circumference}" stroke-dashoffset="${ringOffset}"/>
          </svg>
          <div class="ring-center"><div class="num">${data.streak}</div><div class="unit">Tuần streak</div></div>
        </div>
        <p class="streak-sub">${cw.videoCount}/${cw.mucTieu} video tuần này ${cw.dat ? '— đã đạt chuẩn' : ''}</p>
      </div>

      <div class="card">
        <div class="card__head"><div class="card__title-group">${ICON_TREND}<p class="card__title">Đánh dấu hôm nay</p></div></div>
        <div class="tap-row">
          <button class="tap-btn" data-action="mark-video" data-kenh="TikTok" type="button">TikTok</button>
          <button class="tap-btn" data-action="mark-video" data-kenh="FB1" type="button">FB1</button>
          <button class="tap-btn" data-action="mark-video" data-kenh="FB2" type="button">FB2</button>
        </div>
      </div>

      <div class="card">
        <div class="card__head">
          <div class="card__title-group">${ICON_BARS}<p class="card__title">Số liệu kênh</p></div>
          <button class="qb-btn ghost" data-action="kenh-toggle" type="button">Nhập số liệu</button>
        </div>
        ${kenhStatsHtml}
        <div class="kenh-form" id="kenh-form">
          <div class="kenh-form-row">
            <div><label>TikTok follow</label><input type="number" id="kenh-tiktok" inputmode="numeric" /></div>
            <div><label>FB1 follow</label><input type="number" id="kenh-fb1" inputmode="numeric" /></div>
          </div>
          <div class="kenh-form-row">
            <div><label>FB2 follow</label><input type="number" id="kenh-fb2" inputmode="numeric" /></div>
            <div><label>Group thành viên</label><input type="number" id="kenh-group" inputmode="numeric" /></div>
          </div>
          <div class="kenh-form-row">
            <div><label>Câu hỏi inbound</label><input type="number" id="kenh-inbound" inputmode="numeric" /></div>
          </div>
          <button class="qb-btn primary" data-action="kenh-submit" type="button">Gửi</button>
        </div>
      </div>

      <div class="card">
        <div class="card__head"><p class="card__title">Video gần đây</p></div>
        <ul class="row-list">${videosHtml || '<li>Chưa có dữ liệu</li>'}</ul>
      </div>
    `;

  // ── Tab D — Nghi thức ─────────────────────────────────────
  let tabDData = null;

  function drawEnergyChart(svgId, values, threshold) {
    const svg = document.getElementById(svgId);
    if (!svg || values.length === 0) return;
    const w = 280, h = 100, pad = 10, min = 1, max = 10;
    const xAt = (i) => pad + (values.length === 1 ? (w - pad * 2) / 2 : (i / (values.length - 1)) * (w - pad * 2));
    const yAt = (v) => h - pad - ((v - min) / (max - min)) * (h - pad * 2);
    const pts = values.map((v, i) => [xAt(i), yAt(v)]);
    const line = pts.map((p) => p.join(',')).join(' ');
    const dangerY = yAt(threshold);
    const dotsSvg = pts.map((p, i) => {
      const danger = values[i] <= threshold;
      const r = i === pts.length - 1 ? 3.4 : 2.4;
      return `<circle cx="${p[0]}" cy="${p[1]}" r="${r}" fill="${danger ? '#bd5548' : '#c9a24b'}"/>`;
    }).join('');
    svg.innerHTML = `
      <rect x="0" y="${dangerY}" width="${w}" height="${h - pad - dangerY}" fill="#bd5548" opacity="0.10"/>
      <line x1="0" y1="${dangerY}" x2="${w}" y2="${dangerY}" stroke="#bd5548" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
      ${values.length > 1 ? `<polyline points="${line}" fill="none" stroke="#c9a24b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>` : ''}
      ${dotsSvg}`;
  }

  // Ưu tiên: miss 2 nghi thức liên tiếp (khẩn cấp, bắt trả lời) > đang giảm tải (khẩn cấp, dai dẳng)
  // > nhắc đúng ngày kỳ vọng (Thứ Hai/Thứ Sáu) > im lặng nếu không có gì đáng nói
  function renderTopBanner(data) {
    if (data.missStreak) {
      return `
        <div class="banner-danger">
          <p class="bd-title">Hệ thống hỏng ở đâu?</p>
          <p>Đã bỏ lỡ 2 mốc nghi thức liên tiếp (#tuanmoi Thứ Hai / #dongtuan Thứ Sáu). Trả lời 1 dòng trước khi tiếp tục:</p>

          </div>
        </div>`;
    }
    if (data.dangGiamTai) {
      return `<div class="banner-warn">Đang ở <strong>chế độ giảm tải</strong> — mục tiêu video còn 2/tuần, dự án Quỹ B tạm Đóng băng. Duy trì đến khi năng lượng đạt ≥6 trong #dongtuan.</div>`;
    }
    const jsDay = new Date().getDay();
    if (jsDay === 1 && !data.tuanMoiDoneThisWeek) {
      return renderInsight(`Hôm nay Thứ Hai — chưa nộp <strong>#tuanmoi</strong> tuần này.`);

    if (jsDay === 5 && !data.dongTuanDoneThisWeek) {
      return renderInsight(`Hôm nay Thứ Sáu — chưa nộp <strong>#dongtuan</strong> tuần này.`);
    }
    return '';
  }

  function renderDongTuanCard(data) {
    if (data.dongTuanDoneThisWeek && data.lastDongTuan) {
      const ld = data.lastDongTuan;
      return `
        <div class="card">
          <div class="card__head"><div class="card__title-group">${ICON_GRID}<p class="card__title">#dongtuan — đã nộp tuần này</p></div></div>
          <div class="dongtuan-grid">

            <div class="dongtuan-cell"><div class="v">${ld.viecMiss}</div><div class="l">Việc miss</div></div>

          </div>
        </div>`;
    }
    return `
      <div class="card">
        <div class="card__head"><div class="card__title-group">${ICON_GRID}<p class="card__title">#dongtuan tuần này</p></div></div>
        <div class="ritual-form">
          <div class="ritual-form-row">
            <div><label>Video đạt</label><input type="number" id="dt-video" inputmode="numeric" /></div>
            <div><label>Lần cập nhật Quỹ B</label><input type="number" id="dt-quyb" inputmode="numeric" /></div>
          </div>
          <div class="ritual-form-row">
            <div><label>Việc miss</label><input type="number" id="dt-miss" inputmode="numeric" /></div>
            <div><label>Năng lượng (1-10)</label><input type="number" id="dt-nangluong" inputmode="numeric" min="1" max="10" /></div>
          </div>
          <button class="qb-btn primary" data-action="dongtuan-submit" type="button">Gửi #dongtuan</button>
        </div>
      </div>`;
  }

  function renderEnergyCard(data) {
    if (!data.energySeries || data.energySeries.length === 0) {
      return `
        <div class="card">
          <div class="card__head"><p class="card__title">Năng lượng theo tuần</p></div>
          <div class="placeholder">Chưa có dữ liệu — nộp #dongtuan để bắt đầu theo dõi</div>
        </div>`;
    }
    return `
      <div class="card">
        <div class="card__head"><p class="card__title">Năng lượng theo tuần</p></div>
        <div class="energy-wrap"><svg id="energy-chart" viewBox="0 0 280 100" preserveAspectRatio="none"></svg></div>
      </div>`;
  }

  function renderTabD(data) {
    return `
      ${renderTopBanner(data)}
      ${renderTuanMoiCard(data)}
      ${renderDongTuanCard(data)}
      ${renderEnergyCard(data)}
    `;
  }

  async function loadTabD(opts) {
    opts = opts || {};
    const el = document.getElementById('tab-d-content');
    if (!opts.silent) {
      el.className = 'loading';
      el.textContent = 'Đang tải...';
    }
    try {
      const data = await jsonp('getNghiThuc', {});
      if (data.error) {
        el.className = 'error';
        el.textContent = 'Lỗi: ' + data.error;
        return;
      }
      tabDData = data;
      el.className = '';
      el.innerHTML = renderTabD(data);
      drawEnergyChart('energy-chart', (data.energySeries || []).map((s) => s.nangLuong), data.nguongNangLuong || 4);
    } catch (err) {
      el.className = 'error';
      el.textContent = 'Không tải được dữ liệu: ' + err.message;
    }
  }

  document.getElementById('tab-d-content').addEventListener('click', async (e) => {
    const btn = e.target.closest('button[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;

    if (action === 'tuanmoi-submit') {
      const a = document.getElementById('uutien-a').value.trim();
      const b = document.getElementById('uutien-b').value.trim();
      const c = document.getElementById('uutien-c').value.trim();
      if (!a) { document.getElementById('uutien-a').focus(); return; }
      btn.disabled = true;
      btn.textContent = 'Đang gửi...';
      await postAction('nopTuanMoi', { uuTienA: a, uuTienB: b, uuTienC: c });
      setTimeout(() => loadTabD({ silent: true }), 800);
      return;
    }

    if (action === 'dongtuan-submit') {
      const video = document.getElementById('dt-video').value || 0;
      const quyb = document.getElementById('dt-quyb').value || 0;
      const miss = document.getElementById('dt-miss').value || 0;
      const nangLuongEl = document.getElementById('dt-nangluong');
      if (!nangLuongEl.value) { nangLuongEl.focus(); return; }
      btn.disabled = true;
      btn.textContent = 'Đang gửi...';
      await postAction('nopDongTuan', { video, quyBCapNhat: quyb, viecMiss: miss, nangLuong: nangLuongEl.value });
      setTimeout(() => loadTabD({ silent: true }), 800);
      return;
    }

    if (action === 'chan-doan-submit') {
      const input = document.getElementById('chan-doan-input');
      const traLoi = input.value.trim();
      if (!traLoi) { input.focus(); return; }
      btn.disabled = true;
      btn.textContent = 'Đang gửi...';
      await postAction('nopChanDoan', { traLoi });
      setTimeout(() => loadTabD({ silent: true }), 800);
      return;
    }
  });

  // ── Service worker ───────────────────────────────────────
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
  }
</script>

</body>
</html>
